<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>QA Pro | Analytics & MTD Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://googleapis.com" rel="stylesheet">
  <style>
    /* Default CSS Variables - Kini pulihan sa JavaScript gikan sa JSON */
    :root {
      --primary: #f59e0b;    --bg: #fef3c7;
      --card: #0f172a;       --text-light: #f8fafc;
      --text-dark: #0f172a;  --border: rgba(255,255,255,0.1);
    }
    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: var(--text-dark); margin: 0; padding: 0; transition: 0.5s; }
    
    .header-main { 
      background: var(--card); padding: 15px 30px; color: var(--primary); 
      border-bottom: 5px solid var(--primary); display: flex; justify-content: space-between; align-items: center;
    }
    .header-main h1 { margin: 0; font-size: 1.1rem; font-weight: 800; letter-spacing: 2px; flex: 1; text-align: center; }
    
    .admin-btn {
      background: transparent; color: #94a3b8; font-size: 0.7rem; font-weight: 700;
      padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer;
    }

    .nav-bar { background: var(--card); opacity: 0.95; backdrop-filter: blur(10px); border-bottom: 1px solid var(--primary); padding: 12px 0; position: sticky; top: 0; z-index: 100; overflow-x: auto; }
    .nav-inner { display: flex; justify-content: center; gap: 10px; padding: 0 15px; }
    .agent-pill { padding: 8px 18px; border-radius: 30px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: #94a3b8; font-weight: 700; font-size: 0.75rem; cursor: pointer; display: flex; align-items: center; gap: 8px; white-space: nowrap; }
    .agent-pill.active { background: var(--primary); color: var(--text-dark); border-color: var(--primary); }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    
    .content-container { max-width: 900px; margin: 30px auto; padding: 0 20px 80px; }
    
    .kpi-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 30px; }
    .kpi-box { padding: 20px 10px; border-radius: 24px; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 125px; transition: 0.3s; }
    .kpi-1 { background: var(--card); border: 2px solid var(--primary); } 
    .kpi-2 { background: var(--primary); color: var(--text-dark); } 
    .kpi-3 { background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: white; }
    .kpi-label { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; color: #ffffff !important; letter-spacing: 1px; }
    .kpi-value { font-size: 1.8rem; font-weight: 900; line-height: 1; text-transform: uppercase; color: #ffffff !important; }

    .dashboard-tabs { display: flex; gap: 8px; margin-bottom: 20px; background: var(--card); padding: 8px; border-radius: 16px; border: 1px solid var(--border); }
    .dash-tab-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; background: transparent; color: #94a3b8; font-weight: 800; font-size: 0.7rem; cursor: pointer; }
    .dash-tab-btn.active { background: var(--primary); color: var(--text-dark); }

    .main-card { background: var(--card); border-radius: 32px; overflow: hidden; color: var(--text-light); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
    .card-head { padding: 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }

    .btn-group { display: flex; gap: 10px; align-items: center; }
    .inquire-btn { background: transparent; color: var(--primary); border: 2px solid var(--primary); padding: 8px 18px; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 0.75rem; }
    .unlock-btn { background: var(--primary); color: var(--text-dark); padding: 10px 20px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; font-size: 0.8rem; }

    .mtd-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 16px; border: 1px solid var(--primary); margin-top: 15px; width: 100%; }
    .mtd-item { text-align: center; }
    .mtd-label { font-size: 0.65rem; color: #94a3b8; font-weight: 700; text-transform: uppercase; }
    .mtd-val { font-size: 1rem; font-weight: 800; color: white; }

    .table-block { padding: 30px; border-bottom: 1px solid var(--border); }
    .table-block h3 { color: var(--primary); font-size: 0.9rem; margin-bottom: 15px; text-transform: uppercase; }
    table { width: 100%; border-collapse: collapse; }
    td { padding: 15px 10px; border-top: 1px solid var(--border); color: #ffffff; font-size: 0.95rem; line-height: 1.6; }
    .quote-style { font-weight: 600; color: #fde68a; background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 6px; border-left: 3px solid var(--primary); display: inline-block; margin: 2px 0; }

    .modal { display: none; position: fixed; inset: 0; background:rgba(0,0,0,0.9); backdrop-filter:blur(10px); z-index: 200; justify-content:center; align-items:center; }
    .modal-content { background:var(--card); padding:40px; border-radius:30px; width:340px; text-align:center; border: 2px solid var(--primary); }
    .modal-content input { width:100%; padding:15px; margin:20px 0; border:2px solid var(--border); background: rgba(0,0,0,0.3); color:white; border-radius:15px; text-align:center; font-size: 1.5rem; font-weight: 800; outline: none; }
    .btn-verify { background: var(--primary); color: var(--text-dark); padding: 15px; border:none; border-radius:15px; width: 100%; font-weight:800; cursor:pointer; }
  </style>
</head>
<body>
  <header class="header-main">
    <div style="width: 80px;"></div>
    <h1>AGENT ANALYTICS PORTAL</h1>
    <button onclick="openAdminModal()" class="admin-btn">ADMIN</button>
  </header>

  <nav class="nav-bar"><div id="agentPills" class="nav-inner"></div></nav>
  
  <div class="content-container">
    <div id="dashboardView"></div>
  </div>

  <div id="passwordModal" class="modal">
    <div class="modal-content">
      <h3 style="color:var(--primary); margin:0;">🔐 UNLOCK MTD SCORES</h3>
      <input type="password" id="pwInput" placeholder="••••" />
      <button class="btn-verify" onclick="verifyAndShowScores()">VERIFY ACCESS</button>
      <p onclick="closeModal('passwordModal')" style="color:#94a3b8; cursor:pointer; margin-top:20px; font-size:0.85rem;">Cancel</p>
    </div>
  </div>

  <div id="adminModal" class="modal">
    <div class="modal-content">
      <h3 style="color:var(--primary); margin:0;">🚨 ADMIN ACCESS</h3>
      <input type="password" id="adminPwInput" placeholder="••••" />
      <button class="btn-verify" onclick="verifyAdmin()">ACCESS EDITOR</button>
      <p onclick="closeModal('adminModal')" style="color:#94a3b8; cursor:pointer; margin-top:20px; font-size:0.85rem;">Cancel</p>
    </div>
  </div>
  <script>
    let db = { theme: {}, agents: [] };
    let activeAgent = null;
    let currentViewWeek = 'week1';
    let isUnlocked = false;
    const MY_EMAIL = "hitsuguya08@gmail.com"; 

    window.addEventListener('DOMContentLoaded', () => {
      fetch('data.json?t=' + new Date().getTime())
        .then(r => r.json())
        .then(data => { 
          // Check if data is new format or old
          db = data.agents ? data : { theme: { primary: "#f59e0b", bg: "#fef3c7", card: "#0f172a" }, agents: data };
          applyTheme(db.theme);
          renderPills(db.agents); 
        })
        .catch(() => { document.getElementById('dashboardView').innerHTML = `<div style="text-align:center; padding:50px; color:var(--primary);"><h3>⚠️ Syncing Data...</h3></div>`; });
    });

    function applyTheme(theme) {
      if(!theme) return;
      const root = document.documentElement;
      root.style.setProperty('--primary', theme.primary);
      root.style.setProperty('--bg', theme.bg);
      root.style.setProperty('--card', theme.card);
    }

    function renderPills(agents) {
      const box = document.getElementById('agentPills'); box.innerHTML = '';
      agents.forEach((agent, i) => {
        const pill = document.createElement('div'); pill.className = 'agent-pill';
        pill.innerHTML = `<div class="dot" style="background:var(--primary)"></div> ${agent.name}`;
        pill.onclick = () => { selectAgent(agent, pill); };
        box.appendChild(pill); if(i === 0) pill.click();
      });
    }

    function selectAgent(agent, element) {
      activeAgent = agent;
      isUnlocked = false;
      currentViewWeek = 'week1';
      document.querySelectorAll('.agent-pill').forEach(el => el.classList.remove('active'));
      element.classList.add('active');
      renderDashboard();
    }

    function switchDashboardWeek(week) {
        currentViewWeek = week;
        renderDashboard();
    }

    function renderDashboard() {
      if(!activeAgent.weekly_data) {
          activeAgent.weekly_data = { week1:{score:0,qa:[],audits:[]}, week2:{score:0,qa:[],audits:[]}, week3:{score:0,qa:[],audits:[]}, week4:{score:0,qa:[],audits:[]} };
      }
      
      const weekly = activeAgent.weekly_data[currentViewWeek];
      const qas = weekly.qa || [];
      const audits = weekly.audits || [];
      const displayMonth = activeAgent.month || "MAY";

      document.getElementById('dashboardView').innerHTML = `
        <div class="kpi-row">
            <div class="kpi-box kpi-1"><div class="kpi-label">MONTH</div><div class="kpi-value">${displayMonth}</div></div>
            <div class="kpi-box kpi-2"><div class="kpi-label">QA EVALS</div><div class="kpi-value" style="color:var(--text-dark)">${qas.length}</div></div>
            <div class="kpi-box kpi-3"><div class="kpi-label">AUDITS</div><div class="kpi-value">${audits.length}</div></div>
        </div>

        <div class="dashboard-tabs">
            <button class="dash-tab-btn ${currentViewWeek === 'week1' ? 'active' : ''}" onclick="switchDashboardWeek('week1')">WEEK 1</button>
            <button class="dash-tab-btn ${currentViewWeek === 'week2' ? 'active' : ''}" onclick="switchDashboardWeek('week2')">WEEK 2</button>
            <button class="dash-tab-btn ${currentViewWeek === 'week3' ? 'active' : ''}" onclick="switchDashboardWeek('week3')">WEEK 3</button>
            <button class="dash-tab-btn ${currentViewWeek === 'week4' ? 'active' : ''}" onclick="switchDashboardWeek('week4')">WEEK 4</button>
        </div>

        <div class="main-card">
            <div class="card-head" style="flex-direction: column; align-items: flex-start; gap: 20px; padding: 30px;">
                <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                    <h2 style="margin:0; color:var(--primary)">${activeAgent.name}</h2>
                    <div class="btn-group">
                        <button class="inquire-btn" onclick="sendInquiry()">✉️ CLARIFY FEEDBACK</button>
                        ${!isUnlocked ? '<button class="unlock-btn" onclick="openAgentModal()">🔐 UNLOCK MTD SCORES</button>' : ''}
                    </div>
                </div>
                <div id="unlockArea" style="width: 100%;">
                    ${isUnlocked ? renderScoreGrid() : ''}
                </div>
            </div>
            ${renderTable('QA Feedback (' + currentViewWeek.toUpperCase() + ')', qas)}
            ${renderTable('Dispo Audits', audits)}
        </div>`;
    }

    function renderScoreGrid() {
      const wd = activeAgent.weekly_data;
      const s1 = parseFloat(wd.week1.score || 0), s2 = parseFloat(wd.week2.score || 0), s3 = parseFloat(wd.week3.score || 0), s4 = parseFloat(wd.week4.score || 0);
      const allS = [s1, s2, s3, s4].filter(s => s > 0);
      const mtd = allS.length > 0 ? (allS.reduce((a,b) => a+b, 0) / allS.length).toFixed(2) : "0.00";

      return `
        <div class="mtd-grid">
            <div class="mtd-item"><div class="mtd-label">W1</div><div class="mtd-val">${s1}%</div></div>
            <div class="mtd-item"><div class="mtd-label">W2</div><div class="mtd-val">${s2}%</div></div>
            <div class="mtd-item"><div class="mtd-label">W3</div><div class="mtd-val">${s3}%</div></div>
            <div class="mtd-item"><div class="mtd-label">W4</div><div class="mtd-val">${s4}%</div></div>
            <div class="mtd-item" style="border-left:2px solid var(--primary)"><div class="mtd-label" style="color:var(--primary)">MTD</div><div class="mtd-val" style="color:var(--primary); font-size:1.1rem;">${mtd}%</div></div>
        </div>`;
    }

    function renderTable(title, data) {
      if(data.length === 0) return `<div class="table-block"><h3>${title}</h3><p style="color:#94a3b8; font-size:0.85rem;">No entries recorded.</p></div>`;
      return `<div class="table-block"><h3>${title}</h3><table><tbody>
        ${data.map((item, i) => {
          let f = item.replace(/"([^"]+)"/g, '<span class="quote-style">"$1"</span>');
          return `<tr><td style="width:35px; color:var(--primary); font-weight:800;">${i+1}</td><td>${f}</td></tr>`;
        }).join('')}
      </tbody></table></div>`;
    }

    function sendInquiry() {
      const subject = encodeURIComponent(`QA Inquiry: ${activeAgent.name} (${currentViewWeek.toUpperCase()})`);
      window.location.href = `mailto:${MY_EMAIL}?subject=${subject}`;
    }

    function openAgentModal() { document.getElementById('pwInput').value = ''; document.getElementById('passwordModal').style.display = 'flex'; }
    function openAdminModal() { document.getElementById('adminPwInput').value = ''; document.getElementById('adminModal').style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function verifyAdmin() {
      if (document.getElementById('adminPwInput').value === "0513971123") { window.location.href = "admin.html"; } 
      else { alert("❌ Unauthorized Access"); }
    }

    function verifyAndShowScores() {
      const inputPw = document.getElementById('pwInput').value.trim();
      if(activeAgent && inputPw === activeAgent.password.toString().trim()) {
          isUnlocked = true;
          renderDashboard();
          closeModal('passwordModal');
      } else { alert('❌ Incorrect Access Code'); }
    }
  </script>
</body>
</html>
